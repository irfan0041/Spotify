<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </div>
            <div class="nav-links">
                <ul>
                    <li class="active"><i class="fas fa-home"></i> <span>Home</span></li>
                    <li><i class="fas fa-search"></i> <span>Search</span></li>
                    <li><i class="fas fa-book"></i> <span>Your Library</span></li>
                </ul>
            </div>
            <div class="library-options">
                <div class="options">
                    <div class="lib-option">
                        <i class="fas fa-plus-square"></i>
                        <span>Create Playlist</span>
                    </div>
                    <div class="lib-option">
                        <i class="fas fa-heart"></i>
                        <span>Liked Songs</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-nav">
                <div class="nav-arrows">
                    <i class="fas fa-chevron-left"></i>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="user-profile">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
            
            <div class="header">
                <h2>Good evening</h2>
            </div>
            
            <div class="cards-container">
                <!-- Song items will be injected here by JS -->
            </div>
        </div>

        <!-- Playbar -->
        <div class="playbar">
            <div class="song-info">
                <img src="https://via.placeholder.com/50/1db954/000000?text=Music" alt="Album Art" id="current-cover">
                <div class="info-text">
                    <h4 id="current-title">Select a song</h4>
                    <p id="current-artist">Unknown</p>
                </div>
                <i class="far fa-heart"></i>
            </div>
            
            <div class="player-controls">
                <div class="controls-buttons">
                    <i class="fas fa-random"></i>
                    <i class="fas fa-step-backward" id="prev-btn"></i>
                    <i class="far fa-play-circle main-play" id="play-btn"></i>
                    <i class="fas fa-step-forward" id="next-btn"></i>
                    <i class="fas fa-redo-alt"></i>
                </div>
                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <input type="range" min="0" max="100" value="0" class="progress-bar" id="progress-bar">
                    <span id="total-time">0:00</span>
                </div>
            </div>
            
            <div class="volume-controls">
                <i class="fas fa-list"></i>
                <i class="fas fa-desktop"></i>
                <i class="fas fa-volume-up" id="volume-icon"></i>
                <input type="range" min="0" max="100" value="100" class="volume-bar" id="volume-bar">
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
